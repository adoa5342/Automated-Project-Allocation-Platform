services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: p42
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
      build: ./backend
      ports:
        - "3000:3000"
      environment:
        DATABASE_URL: "postgresql://user:password@postgres:5432/p42"
        ALLOCATOR_URL: "http://allocator:8000"
      depends_on:
        - postgres
        - allocator

  allocator:
    build: ./allocator
    ports:
      - "8000:8000"

  frontend:
    build: ./admin-dashboard
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:3000/
      # - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: